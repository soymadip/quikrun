name: Publish to AUR
run-name: "Publish AUR Package: ${{ github.ref_name }}"

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
    paths:
      - 'PKGBUILD'
  workflow_dispatch:

concurrency:
  group: update-aur
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  update-aur:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref_type == 'tag') ||
      (github.event_name == 'push' && github.ref_type == 'branch' && !startsWith(github.event.head_commit.message, 'chore(release):'))
    environment:
      name: aur
      url:  "https://aur.archlinux.org/packages/${{ github.event.repository.name }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get Version and Repo Metadata
        id: get_version
        run: |
          repo_name=$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')
          echo "REPO_NAME=$repo_name" >> "$GITHUB_ENV"

          # Source the PKGBUILD to get the updated version and release directly
          source PKGBUILD
          
          echo "VERSION=$pkgver" >> "$GITHUB_ENV"
          echo "PKGREL=$pkgrel" >> "$GITHUB_ENV"

      - name: Wait for PyPI publication
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for version ${{ env.VERSION }} to be published..."
          
          # Try to find a matching workflow run for 'Publish to PyPI'
          RUN_INFO=$(gh run list --workflow "Publish to PyPI" --commit "${{ github.sha }}" --json status,conclusion,url --limit 1 2>/dev/null || true)
          STATUS=$(echo "$RUN_INFO" | jq -r '.[0].status // empty')
          
          if [[ -n "$STATUS" ]]; then
            echo "Found active 'Publish to PyPI' workflow run."
            for i in {1..30}; do
              RUN_INFO=$(gh run list --workflow "Publish to PyPI" --commit "${{ github.sha }}" --json status,conclusion,url --limit 1)
              STATUS=$(echo "$RUN_INFO" | jq -r '.[0].status // empty')
              CONCLUSION=$(echo "$RUN_INFO" | jq -r '.[0].conclusion // empty')
              RUN_URL=$(echo "$RUN_INFO" | jq -r '.[0].url // empty')
              
              if [[ "$STATUS" == "completed" ]]; then
                if [[ "$CONCLUSION" == "success" ]]; then
                  echo "Publish to PyPI succeeded! Run URL: $RUN_URL"
                  break
                else
                  echo "Error: Publish to PyPI completed with conclusion: $CONCLUSION. Run URL: $RUN_URL"
                  exit 1
                fi
              fi
              echo "Publish to PyPI is currently: $STATUS. Waiting 10 seconds..."
              sleep 10
            done
          else
            echo "No active 'Publish to PyPI' workflow run found for this commit. Falling back to public PyPI registry polling..."
          fi

          # Fallback / Double-check: Poll the public PyPI registry to ensure package is fully indexable
          echo "Verifying availability on PyPI registry..."
          sleep 5
          
          for i in {1..30}; do
            CURRENT_VERSION=$(curl -s "https://pypi.org/pypi/${{ env.REPO_NAME }}/json" | jq -r '.info.version // empty')

            if [[ "$CURRENT_VERSION" == "${{ env.VERSION }}" ]]; then
              echo "Version ${{ env.VERSION }} is now available on PyPI!"
              exit 0
            fi

            echo "Version is currently: $CURRENT_VERSION. Waiting 10 seconds..."
            sleep 10
          done

          echo "Error: Version ${{ env.VERSION }} was not published to PyPI within 5 minutes."
          exit 1

      - name: Validate Version Format
        run: |
          if [[ ! "${{ env.VERSION }}" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            echo "ERROR: Invalid version format detected: '${{ env.VERSION }}'"
            echo "Version must be numeric (e.g., 1.2.3). Stopping workflow."
            exit 1
          fi

      - name: Check Current AUR Version
        id: check_aur
        run: |
          AUR_FULL_VERSION=$(curl -s "https://aur.archlinux.org/rpc/v5/info/${{ env.REPO_NAME }}" | \
            jq -r '.results[0].Version // empty')

          REPO_FULL_VERSION="${{ env.VERSION }}-${{ env.PKGREL }}"

          echo "Repo version target: $REPO_FULL_VERSION"
          echo "AUR version current: $AUR_FULL_VERSION"

          if [ -z "$AUR_FULL_VERSION" ] || [ "$AUR_FULL_VERSION" == "null" ]; then
            echo "Package not in AUR yet. Proceeding."
            echo "SKIP_UPDATE=false" >> "$GITHUB_ENV"
          elif [ "$AUR_FULL_VERSION" == "$REPO_FULL_VERSION" ]; then
            echo "AUR is already up to date. Skipping."
            echo "SKIP_UPDATE=true" >> "$GITHUB_ENV"
          else
            # Verify if local is actually newer to prevent accidental downgrades
            if echo -e "${AUR_FULL_VERSION}\n${REPO_FULL_VERSION}" | sort -V -C 2>/dev/null; then
              echo "AUR version is older. Proceeding with update."
              echo "SKIP_UPDATE=false" >> "$GITHUB_ENV"
            else
              echo "Warning: AUR version is newer than Local. Skipping to prevent downgrade."
              echo "SKIP_UPDATE=true" >> "$GITHUB_ENV"
            fi
          fi

      - name: Update PKGBUILD and Checksums
        if: env.SKIP_UPDATE == 'false'
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            -e VERSION="${{ env.VERSION }}" \
            archlinux:base-devel sh -c '
              pacman -Sy --noconfirm pacman-contrib git
              useradd -m builduser
              chown -R builduser:builduser .

              # Update PKGBUILD with the release version
              echo "Updating PKGBUILD to v$VERSION"
              sed -i "s/^pkgver=.*$/pkgver=$VERSION/" PKGBUILD
              sed -i "s/^pkgrel=.*$/pkgrel=1/" PKGBUILD

              # Generate new checksums and .SRCINFO as builduser
              su builduser -c "updpkgsums"
              su builduser -c "makepkg --printsrcinfo > .SRCINFO"

              # Fix permissions for the GitHub runner user (UID 1001)
              chown -R 1001:121 .
            '

      - name: Publish to AUR
        if: env.SKIP_UPDATE == 'false'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: ${{ env.REPO_NAME }}
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ env.VERSION }}-${{ env.PKGREL }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
