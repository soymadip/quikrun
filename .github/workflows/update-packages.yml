name: Update Packages
run-name: "Publish Packages: ${{ github.ref_name }}"

on:
  workflow_run:
    workflows: ["Create GitHub Release"]
    types:
      - completed

  push:
    branches: [main]
    paths:
      - "PKGBUILD"
      - "pyproject.toml"
      - ".github/workflows/update-packages.yml"

  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.4.0)"
        required: false
        type: string

concurrency:
  group: update-dist-packages
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  get-info:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore(release):')) ||
      (github.event_name == 'workflow_dispatch')

    outputs:
      version: ${{ steps.resolve-meta.outputs.version }}
      is_manual: ${{ steps.resolve-meta.outputs.is_manual }}
      pkgname: ${{ steps.resolve-meta.outputs.pkgname }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve metadata
        id: resolve-meta
        run: |
          # Get package name from repository name (lowercase)
          PKGNAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')

          # Workflow run
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            RAW_TAG="${{ github.event.workflow_run.head_branch }}"
            if [[ "$RAW_TAG" == "main" || -z "$RAW_TAG" ]]; then
              RAW_TAG=$(git describe --tags --abbrev=0)
            fi

            VERSION="${RAW_TAG#v}"
            IS_MANUAL="false"

          # Workflow dispatch with version input
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
            IS_MANUAL="true"

          # Push or manual without version input: Read from file
          else
            VERSION=$(sed -n 's/^pkgver=//p' PKGBUILD | tr -d '"' | tr -d "'")
            IS_MANUAL="true"
          fi

          echo "Package Name:     $PKGNAME"
          echo "Detected Version: $VERSION"
          echo "Is Manual Update: $IS_MANUAL"

          # Output core variables
          echo "pkgname=$PKGNAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_manual=$IS_MANUAL" >> "$GITHUB_OUTPUT"

  update-pypi:
    needs: get-info
    if: needs.get-info.outputs.is_manual == 'false'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/${{ github.event.repository.name }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          cache-python: true
          activate-environment: "true"

      - name: Build
        run: uv build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  update-aur:
    needs: [get-info, update-pypi]
    if: |
      always() && 
      needs.get-info.result == 'success' && 
      (needs.update-pypi.result == 'success' || needs.update-pypi.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: aur
      url: "https://aur.archlinux.org/packages/${{ github.event.repository.name }}"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get Version and Repo Metadata
        id: get_version
        run: |
          # Source the PKGBUILD to get the updated version and release directly
          source PKGBUILD

          # If this is an automatic update, use the version detected by get-info
          VERSION="${{ needs.get-info.outputs.version }}"
          PKGNAME="${{ needs.get-info.outputs.pkgname }}"
          IS_MANUAL="${{ needs.get-info.outputs.is_manual }}"

          echo "PKGNAME=$PKGNAME" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "PKGREL=$pkgrel" >> "$GITHUB_ENV"
          echo "IS_MANUAL=$IS_MANUAL" >> "$GITHUB_ENV"

      - name: Validate Version Format
        run: |
          if [[ ! "${{ env.VERSION }}" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            echo "ERROR: Invalid version format detected: '${{ env.VERSION }}'"
            echo "Version must be numeric (e.g., 1.2.3). Stopping workflow."
            exit 1
          fi

      - name: Check Current AUR Version
        id: check_aur
        run: |
          if [ "${{ env.IS_MANUAL }}" == "true" ]; then
             echo "SKIP_UPDATE=false" >> "$GITHUB_ENV"
             echo "Manual update requested. Proceeding."
          else
             AUR_FULL_VERSION=$(curl -s "https://aur.archlinux.org/rpc/v5/info/${{ env.PKGNAME }}" | \
               jq -r '.results[0].Version // empty')

             REPO_FULL_VERSION="${{ env.VERSION }}-${{ env.PKGREL }}"

             echo "Repo version target: $REPO_FULL_VERSION"
             echo "AUR version current: $AUR_FULL_VERSION"

             if [ -z "$AUR_FULL_VERSION" ] || [ "$AUR_FULL_VERSION" == "null" ]; then
               echo "Package not in AUR yet. Proceeding."
               echo "SKIP_UPDATE=false" >> "$GITHUB_ENV"
             elif [ "$AUR_FULL_VERSION" == "$REPO_FULL_VERSION" ]; then
               echo "AUR is already up to date. Skipping."
               echo "SKIP_UPDATE=true" >> "$GITHUB_ENV"
             else
               # Verify if local is actually newer to prevent accidental downgrades
               if echo -e "${AUR_FULL_VERSION}\n${REPO_FULL_VERSION}" | sort -V -C 2>/dev/null; then
                 echo "AUR version is older. Proceeding with update."
                 echo "SKIP_UPDATE=false" >> "$GITHUB_ENV"
               else
                 echo "Warning: AUR version is newer than Local. Skipping to prevent downgrade."
                 echo "SKIP_UPDATE=true" >> "$GITHUB_ENV"
               fi
             fi
          fi

      - name: Update PKGBUILD and Checksums
        if: env.SKIP_UPDATE == 'false'
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            -e VERSION="${{ env.VERSION }}" \
            -e IS_MANUAL="${{ env.IS_MANUAL }}" \
            archlinux:base-devel sh -c '
              pacman -Sy --noconfirm pacman-contrib git
              useradd -m builduser
              chown -R builduser:builduser .

              # Update PKGBUILD with the release version
              if [ "$IS_MANUAL" == "false" ]; then
                echo "Updating PKGBUILD to v$VERSION"
                sed -i "s/^pkgver=.*$/pkgver=$VERSION/" PKGBUILD
                sed -i "s/^pkgrel=.*$/pkgrel=1/" PKGBUILD
              fi

              # Generate new checksums and .SRCINFO as builduser
              su builduser -c "updpkgsums"
              su builduser -c "makepkg --printsrcinfo > .SRCINFO"

              # Fix permissions for the GitHub runner user (UID 1001)
              chown -R 1001:121 .
            '

      - name: Publish to AUR
        if: env.SKIP_UPDATE == 'false'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: ${{ env.PKGNAME }}
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ env.VERSION }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519

      - name: Trigger MyRepo Build
        if: success()
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          repository: mydehq/my-repo
          event-type: trigger-build

  update-winget:
    needs: get-info
    if: needs.get-info.outputs.is_manual == 'false'
    runs-on: ubuntu-latest
    environment:
      name: winget
      url: https://winstall.app/apps/${{ github.repository_owner }}.${{ needs.get-info.outputs.pkgname }}
    steps:
      - name: Publish to Winget
        id: winget-release
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: ${{ github.repository_owner }}.${{ needs.get-info.outputs.pkgname }}
          version: ${{ needs.get-info.outputs.version }}
          release-tag: v${{ needs.get-info.outputs.version }}
          installers-regex: '${{ needs.get-info.outputs.pkgname }}-windows-amd64\.exe$'
          max-versions-to-keep: 4
          token: ${{ secrets.WINGET_TOKEN }}
