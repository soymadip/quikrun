name: Test Changes

on:
  push:
    branches: [main]
  pull_request:

env:
  UV_VERSION: latest
  PYTHON_VERSION: "3.13"
  BASE_LAYER: trixie-slim
  IMAGE: ghcr.io/astral-sh/uv:latest-python3.13-trixie-slim
  UV_LINK_MODE: copy
  UV_CACHE_DIR: .uv-cache

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ${{ env.IMAGE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Run tests
        run: |
          uv sync --dev
          uv run pytest tests/

      - name: Prune uv cache
        if: always()
        run: uv cache prune --ci
