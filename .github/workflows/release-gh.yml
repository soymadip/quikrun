name: Create GitHub Release
run-name: "Create GitHub Release: ${{ inputs.version && format('v{0}', inputs.version) || github.ref_name }}"

on:
  push:
    tags:
      - "v*.*.*"

  workflow_dispatch:
    inputs:
      version:
        description: "The version to release (e.g., 1.2.3)"
        required: true

concurrency:
  group: gh-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  get-info:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      tag: v${{ steps.version.outputs.VERSION }}
      is_prerelease: ${{ steps.version.outputs.IS_PRERELEASE }}
      changelog: ${{ steps.changelog.outputs.CHANGELOG }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v4

      - name: Get Version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            tag="${{ github.ref_name }}"
            version="${tag#v}"
          fi
          echo "VERSION=$version" >> "$GITHUB_OUTPUT"

          if [[ "$version" == 0* ]]; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_OUTPUT"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Changelog
        id: changelog
        run: |
          version="${{ steps.version.outputs.VERSION }}"
          new_tag="v${version}"

          # Temporarily tag for changelog generation if manual release
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            git tag "${new_tag}"
          fi

          mise trust
          changelog=$(mise r changelog -- "${new_tag}..${new_tag}" --dry-run | sed -n '/^###/,$p')

          {
            echo "CHANGELOG<<EOF"
            if [[ -n "$changelog" ]]; then
              echo "## What's New?"
              echo "$changelog"
            else
              echo "No changes to note for this release."
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-linux:
    needs: get-info
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0

      - uses: jdx/mise-action@v4

      - name: Cache ccache
        uses: actions/cache@v6
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-ccache-

      - name: Build python distributions
        run: uv build

      - name: Build Linux executable
        run: |
          mise run build
          mv dist/quikrun dist/quikrun-linux-amd64

      - name: Upload Linux and python dists
        uses: actions/upload-artifact@v4
        with:
          name: python-dists
          path: dist/*

  build-windows:
    needs: get-info
    runs-on: windows-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-ccache-

      - name: Build executable
        run: |
          mise run build
          mv dist/quikrun.exe dist/quikrun-windows-amd64.exe

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/quikrun-windows-amd64.exe

  release:
    needs: [get-info, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create Git Tag if Manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.get-info.outputs.tag }}"
          git push origin "${{ needs.get-info.outputs.tag }}"

      - name: Download Python Dists and Linux Executable
        uses: actions/download-artifact@v4
        with:
          name: python-dists
          path: dist/

      - name: Download Windows Exe
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: dist-exe/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.get-info.outputs.tag }}
          name: ${{ needs.get-info.outputs.tag }}
          body: ${{ needs.get-info.outputs.changelog }}
          prerelease: ${{ needs.get-info.outputs.is_prerelease == 'true' }}
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/quikrun-linux-amd64
            dist-exe/quikrun-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
